# ============================================================
# Development Profile Configuration
# ============================================================

spring:
  # Development Database
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:brs_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis (Development)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # RabbitMQ (Development)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  # Show SQL in console (disabled - too verbose)
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Flyway for dev
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

# Development-specific app config
app:
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/jwt-private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:keys/jwt-public.pem}

# Logging
logging:
  level:
    root: INFO
    com.lawfirm.brs: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: OFF

# Swagger UI - enabled in dev
springdoc:
  swagger-ui:
    enabled: true
  show-actuator: true
