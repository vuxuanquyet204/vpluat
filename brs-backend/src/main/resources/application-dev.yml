# ============================================================
# Development Profile Configuration
# ============================================================

spring:
  # Development Database
  datasource:
    url: jdbc:postgresql://localhost:5432/brs_dev
    username: brs_dev
    password: brs_dev_password
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis (Development)
  data:
    redis:
      host: localhost
      port: 6379
      password: ""
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # RabbitMQ (Development)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  # Show SQL in console
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Flyway for dev
  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

# Development-specific app config
app:
  jwt:
    private-key-path: keys/jwt-private.pem
    public-key-path: keys/jwt-public.pem

# Logging
logging:
  level:
    root: INFO
    com.lawfirm.brs: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# Swagger UI - enabled in dev
springdoc:
  swagger-ui:
    enabled: true
  show-actuator: true
