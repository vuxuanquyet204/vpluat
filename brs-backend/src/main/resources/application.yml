# ============================================================
# BRS Backend - Application Configuration
# ============================================================
# This is the base configuration shared by all environments
# Environment-specific overrides are in application-dev.yml, application-prod.yml

spring:
  application:
    name: brs-backend
  profiles:
    active: dev
  config:
    import: optional:file:.env

  # JPA / Hibernate
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

# ============================================================
# Server Configuration
# ============================================================
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

# ============================================================
# Application Custom Properties
# ============================================================
app:
  # JWT Configuration
  jwt:
    private-key-path: ${JWT_PRIVATE_KEY_PATH:keys/jwt-private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:keys/jwt-public.pem}
    access-token-expiry: 15m
    refresh-token-expiry: 7d
    issuer: brs-lawfirm

  # CORS
  cors:
    allowed-origins:
      - ${CORS_ORIGIN_1:http://localhost:3000}
      - ${CORS_ORIGIN_2:http://localhost:5173}
      - ${CORS_ORIGIN_3:https://lawfirm.vn}
      - ${CORS_ORIGIN_4:https://www.lawfirm.vn}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
    max-age: 3600

  # Rate Limiting
  rate-limit:
    auth: 5
    booking: 3
    lead: 5
    search: 60
    chatbot-per-session: 30

  # Cache TTL (in minutes)
  cache:
    services: 5
    lawyers: 5
    faqs: 10
    posts: 2
    search: 2

  # File Upload
  upload:
    max-file-size: 10MB
    max-request-size: 50MB
    allowed-extensions: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx

  # Webhook Verification
  webhook:
    secret: ${WEBHOOK_SECRET:change-this-in-production}

  # Cloudinary Configuration
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

  # OpenAI Configuration
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-3.5-turbo
    max-tokens: 500
    temperature: 0.7
    timeout: 30s

# ============================================================
# Email / SMTP Configuration
# ============================================================
spring:
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: ${MAIL_STARTTLS:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    from: ${MAIL_FROM_ADDRESS:noreply@lawfirm.vn}

app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from-address: ${MAIL_FROM_ADDRESS:noreply@lawfirm.vn}
    from-name: ${MAIL_FROM_NAME:Van Phong Luat}

# ============================================================
# Logging Configuration
# ============================================================
logging:
  level:
    root: INFO
    com.lawfirm.brs: DEBUG
    org.springframework.security: INFO
    org.springframework.data.redis: WARN
    org.springframework.amqp: WARN
    com.zaxxer.hikari: WARN
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/brs-backend.log
    max-size: 100MB
    max-history: 30

# ============================================================
# Actuator Configuration
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: true
    rabbit:
      enabled: true
    db:
      enabled: true
