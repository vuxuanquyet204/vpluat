<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhac nho lich hen</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%); color: white; padding: 30px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f8f9fa; padding: 30px; border-radius: 0 0 8px 8px; }
        .reminder-box { background: #fff5f5; border: 2px solid #e53e3e; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
        .big-time { font-size: 32px; font-weight: bold; color: #c53030; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { color: #666; }
        .value { color: #1e3a5f; font-weight: 600; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Nhac nho lich hen</h1>
        <p>Den gio hen roi!</p>
    </div>
    <div class="content">
        <p>Xin chao <strong th:text="${clientName}">Khach hang</strong>,</p>

        <div class="reminder-box">
            <p style="margin: 0 0 10px 0;">Lich hen cua ban dien ra vao luc</p>
            <p class="big-time" th:text="${dateTime}">--</p>
        </div>

        <div style="background: white; padding: 20px; border-radius: 8px;">
            <div class="info-row">
                <span class="label">Luat su</span>
                <span class="value" th:text="${lawyerName}">--</span>
            </div>
            <div class="info-row" th:if="${meetingType}">
                <span class="label">Hinh thuc</span>
                <span class="value" th:text="${meetingType}">--</span>
            </div>
        </div>

        <p style="margin-top: 20px;">Vui long den dung gio. Neu ban can doi lich, hay lien he ngay voi chung toi.</p>
    </div>
    <div class="footer">
        <p>Van Phong Luat | Hotline: 1900-xxxx</p>
    </div>
</body>
</html>
