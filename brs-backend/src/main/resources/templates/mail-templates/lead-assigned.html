<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead moi duoc phan cong</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #38a169 0%, #276749 100%); color: white; padding: 30px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { background: #f8f9fa; padding: 30px; border-radius: 0 0 8px 8px; }
        .info-box { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .info-row { padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { color: #666; font-size: 14px; }
        .value { color: #1e3a5f; font-weight: 600; font-size: 16px; }
        .footer { text-align: center; padding: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Lead moi duoc phan cong</h1>
    </div>
    <div class="content">
        <p>Xin chao <strong th:text="${userName}">Luat su</strong>,</p>
        <p>Mot lead moi vua duoc phan cong cho ban:</p>

        <div class="info-box">
            <div class="info-row">
                <span class="label">Ten khach hang</span>
                <span class="value" th:text="${leadName}">--</span>
            </div>
            <div class="info-row" th:if="${leadPhone}">
                <span class="label">So dien thoai</span>
                <span class="value" th:text="${leadPhone}">--</span>
            </div>
            <div class="info-row" th:if="${leadEmail}">
                <span class="label">Email</span>
                <span class="value" th:text="${leadEmail}">--</span>
            </div>
            <div class="info-row" th:if="${leadService}">
                <span class="label">Dich vu quan tam</span>
                <span class="value" th:text="${leadService}">--</span>
            </div>
            <div class="info-row" th:if="${leadMessage}">
                <span class="label">Tin nhan</span>
                <span class="value" th:text="${leadMessage}">--</span>
            </div>
        </div>

        <p>Vui long lien he voi khach hang trong thoi gian som nhat.</p>
    </div>
    <div class="footer">
        <p>Van Phong Luat CRM</p>
    </div>
</body>
</html>
