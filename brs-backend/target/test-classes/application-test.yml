spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  rabbitmq:
    host: localhost
    port: 5672

app:
  jwt:
    private-key-path: /tmp/jwt-test-private.pem
    public-key-path: /tmp/jwt-test-public.pem
    access-token-expiry: 15m
    refresh-token-expiry: 7d

  cors:
    allowed-origins:
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

  rate-limit:
    auth: 100
    booking: 100
    lead: 100
    search: 1000
    chatbot-per-session: 1000

logging:
  level:
    root: WARN
    com.lawfirm.brs: DEBUG
